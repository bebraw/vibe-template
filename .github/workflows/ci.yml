name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository shape
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENTS.md
          test -f .asdlc/SKILL.md
          git diff --check
