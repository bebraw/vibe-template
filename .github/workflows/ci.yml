name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repository shape
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENTS.md
          test -f .asdlc/SKILL.md
          test -f .nvmrc
          git diff --check
