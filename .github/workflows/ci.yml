name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository shape
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENTS.md
          test -f .asdlc/SKILL.md
          test -f package.json
          test -f pnpm-lock.yaml
          test -f .dev.vars.example
          git diff --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Enable Corepack
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh corepack enable

      - name: Configure pnpm store
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh pnpm config set store-dir .pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh pnpm install --frozen-lockfile

      - name: Run fast quality gate
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh pnpm run quality:gate:fast

  quality-browser:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Enable Corepack
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh corepack enable

      - name: Configure pnpm store
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh pnpm config set store-dir .pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh pnpm install --frozen-lockfile

      - name: Run browser quality gate
        shell: bash
        run: bash ./scripts/with-local-pnpm-env.sh pnpm run quality:gate:browser
